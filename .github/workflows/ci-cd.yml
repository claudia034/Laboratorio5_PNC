name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

env:
  IMAGE_NAME: laboratorio5-00037221

jobs:
  test-and-smoke:
    name: Tests and Docker smoke test
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: laboratorio_ci
      POSTGRES_USER: laboratorio_ci
      POSTGRES_PASSWORD: laboratorio_ci_password
      DOCKER_IMAGE: laboratorio5-00037221:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Smoke test actuator readiness
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health/readiness; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs api
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down -v

  publish:
    name: Publish image to Docker Hub
    runs-on: ubuntu-latest
    needs: test-and-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
